<div class="orders-page">
  <div class="orders-card">

    <!-- Header -->
    <div class="o-header">
      <button class="back-btn" (click)="goBack()"><i class="bi bi-chevron-left"></i></button>
      <span class="header-title">My Orders</span>
      <div class="header-spacer"></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button *ngFor="let t of tabs"
              class="tab"
              [class.active]="activeTab === t.value"
              [style.--tab-color]="t.color"
              (click)="activeTab = t.value">
        <i class="bi" [ngClass]="t.icon"></i>
        <span>{{ t.label }}</span>
      </button>
    </div>

    <!-- Loading -->
    <div class="loading" *ngIf="isLoading">
      <div class="sk" *ngFor="let x of [1,2,3]"></div>
    </div>

    <!-- Error -->
    <div class="err-msg" *ngIf="!isLoading && errorMsg">
      <i class="bi bi-exclamation-triangle"></i> {{ errorMsg }}
    </div>

    <!-- Empty -->
    <div class="empty" *ngIf="!isLoading && !errorMsg && filteredOrders.length === 0">
      <div class="empty-icon"><i class="bi bi-bag"></i></div>
      <h3>No orders yet</h3>
      <p>Your purchase history will appear here</p>
      <a routerLink="/products" class="shop-btn">Start Shopping</a>
    </div>

    <!-- Orders List -->
    <div class="o-list" *ngIf="!isLoading && filteredOrders.length > 0">
      <div class="o-item" *ngFor="let o of filteredOrders; let i = index" [style.animation-delay]="(i * 0.04) + 's'">
        <div class="o-top">
          <span class="o-id">#{{ o.saleId }}</span>
          <span class="o-status" [style.color]="getStatusColor(o)"
                [style.background]="getStatusColor(o) + '14'">
            {{ getStatusLabel(o) }}
          </span>
        </div>
        <div class="o-mid">
          <span class="o-date"><i class="bi bi-calendar3"></i> {{ getDate(o) }}</span>
          <span class="o-items">{{ getItemCount(o) }} item{{ getItemCount(o) !== 1 ? 's' : '' }}</span>
        </div>
        <div class="o-bottom">
          <span class="o-total">{{ getTotal(o) | currency:'USD':'symbol':'1.0-0' }}</span>
        </div>
      </div>
    </div>

  </div>
</div>
