<div class="star-layer" aria-hidden="true">
  <span
    class="star"
    *ngFor="let s of stars"
    [style.top.%]="s.top"
    [style.left.%]="s.left"
    [style.animationDelay.s]="s.delay"
    [style.animationDuration.s]="s.duration"
    [style.width.px]="s.size"
    [style.height.px]="s.size"
  ></span>
</div>




<!-- 🤖 GLOBAL ROBOT OVERLAY -->
<div *ngIf="showRobot"
     class="robot"
     [class.flip]="robot.flip"
     [class.jump]="robot.jump"
     [style.left.px]="robot.x"
     [style.top.px]="robot.y"
     (click)="robotClick()">

  <!-- 💬 Speech Bubble -->
  <div class="speech" *ngIf="robot.message">
    {{ robot.message }}
  </div>

  <div class="antenna">
    <span class="ball"></span>
  </div>

  <div class="head">
    <div class="eye"></div>
    <div class="eye"></div>
    <div class="mouth"></div>
  </div>

  <div class="body"></div>

  <div class="legs">
    <span class="leg l1"></span>
    <span class="leg l2"></span>
  </div>
</div>
